<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            background-image: url('https://via.placeholder.com/1920x1080?text=Animal+Background');
            background-size: cover;
            background-repeat: no-repeat;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
        }
        header h1 {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0;
        }
        nav {
            text-align: center;
            margin: 1rem 0;
        }
        nav a {
            text-decoration: none;
            color: #333;
            margin: 0 1rem;
            font-weight: bold;
        }
        nav a:hover {
            color: #007BFF;
        }
        section {
            padding: 2rem;
            text-align: center;
        }
        section#home {
            background-image: url('https://via.placeholder.com/800x400?text=Home+Animals');
            background-size: cover;
            background-repeat: no-repeat;
            color: #fff;
        }
        section#about {
            background-image: url('https://via.placeholder.com/800x400?text=About+Animals');
            background-size: cover;
            background-repeat: no-repeat;
            color: #fff;
        }
        section#contact {
            background-image: url('https://via.placeholder.com/800x400?text=Contact+Animals');
            background-size: cover;
            background-repeat: no-repeat;
            color: #fff;
        }
        footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 1rem 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Sample Website</h1>
    </header>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
    <section id="home">
        <h2>Home</h2>
        <p>This is the home section of the website.</p>
    </section>
    <section id="about">
        <h2>About</h2>
        <p>This is the about section of the website.</p>
    </section>
    <section id="contact">
        <h2>Contact</h2>
        <p>This is the contact section of the website.</p>
    </section>
    <footer>
        <p>&copy; 2023 Sample Website. All rights reserved.</p>
    </footer>
</body>
</html>
